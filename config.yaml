--- # ------------------------------------------------------------------------------
# ==============================================================================
# AI 视频生成系统 - 终极优化配置文件 (Ultimate Optimized Config)
# 说明：
#   - 本文件包含全部配置项，适用于 RTX 4090 等旗舰显卡的极致优化。
#   - 启动时，AutoConfigAdapter 会根据实际 GPU 显存自动覆盖带 [AUTO] 标记的参数。
#   - 若使用多卡训练，请设置 distributed: true，并调整 world_size。
#   - 若使用多卡推理（数据并行），请在 WebUI 或命令行设置 use_parallel=True, num_gpus=N。
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. 训练配置 (Train Configuration)
train:
  # [基础训练]
  epochs: 100 # 训练总轮数
  learning_rate: 1e-4 # 初始学习率
  warmup_steps: 5000 # 学习率预热步数
  lr_scheduler: "cosine" # 学习率调度器：cosine（余弦退火），linear（线性）
  mixed_precision: true # 启用混合精度（FP16），节省显存，加速训练
  use_ema: true # 使用指数移动平均（EMA），提升模型稳定性
  ema_decay: 0.9999 # EMA 衰减率

  # [梯度累积与检查点]
  gradient_accumulation_steps: 1 # 梯度累积步数（显存不足时调大，等效增大 batch_size）
  use_gradient_checkpointing: false # 梯度检查点（牺牲速度换显存，长视频训练建议开启）
  grad_clip: 1.0 # 梯度裁剪阈值（防止梯度爆炸）

  # [蒸馏配置 - 核心加速] 若无预训练蒸馏权重，请保持 false
  use_distillation: false # 启用蒸馏训练支持（需配合蒸馏模型权重）
  use_dual_stream: false # 双流蒸馏（DMD + Adv），画质更稳
  distill_steps: 4 # 推理步数：4 步（极速模式），实际由 model.num_inference_steps 控制
  distill_weight: 0.1 # 蒸馏损失权重
  dmd_weight: 0.1 # DMD 损失权重
  adv_weight: 0.1 # 对抗损失权重

  # [高级蒸馏策略 - 需微调]
  use_diagonal_distillation: false # 非对称蒸馏（需代码改造 + 微调）
  train_one_step_distill: false # 训练 1 步蒸馏模型
  one_step_distill_teacher: "./checkpoints/teacher.pt"
  one_step_distill_student: "./checkpoints/student.pt"

  # [物理约束 - 训练时用]
  use_raft_physics: false # 训练时是否使用 RAFT 光流（计算量大，默认关闭）
  physics_weight: 0.1 # 物理约束损失权重

  # [渐进式训练 - 长视频稳定性]
  progressive_frames: [8, 16, 32, 64, 128, 256] # 逐步增加训练帧数
  progressive_epochs: [10, 20, 30, 40, 50] # 各阶段对应轮数

  # [日志]
  use_wandb: false # 是否使用 wandb 在线日志
  log_interval: 10 # 日志记录间隔（步数）
  eval_interval: 5 # 验证间隔（epoch）
  save_dir: "./checkpoints" # 模型保存目录
  log_dir: "./logs" # TensorBoard 日志目录

  # [分布式训练 - 多卡场景]
  distributed: false # 是否分布式训练（多卡自动检测）
  local_rank: 0 # 分布式训练本地 rank（由启动脚本设置）
  world_size: 1 # 分布式训练总进程数（多卡时自动设置为卡数）

  # [首帧锚定与帧损坏]
  first_frame_weight: 2.0 # 首帧重建损失加权（抑制长视频首帧漂移）

# ------------------------------------------------------------------------------
# 2. 模型核心配置 (Model Core Configuration)
# ------------------------------------------------------------------------------
model:
  # [基础架构]
  model_type: "dit" # 模型类型：dit (Transformer), unet (CNN)
  mode: "long" # 模式：creative（<30s）或 long（>30s）
  vae_latent_channels: 4 # VAE 潜变量通道数（LeanVAE 为 4）
  dit_context_dim: 768 # DiT 上下文维度（CLIP 维度）
  dit_depth: 12 # DiT 深度（层数）
  dit_num_heads: 12 # 注意力头数
  dit_mlp_ratio: 4.0 # MLP 扩展比例

  # ========== VAE 配置 (关键加速点) ==========
  vae_type: "lean" # [AUTO] VAE 类型：lean（时间压缩4倍），image（无时间压缩），wf（时间压缩8倍）
  lean_vae_path: "./models/LeanVAE" # LeanVAE 权重路径（diffusers 格式目录）
  wf_vae_path: "./models/WF-VAE" # 预留 WF-VAE 路径

  # ========== 注意力机制 (简化以提速) ==========
  attn_type: "sliding_window" # [AUTO] 注意力类型：sliding_window, block_sparse, strided, performer, calib
  window_size: 512 # 滑动窗口大小
  block_size: 64 # 块稀疏注意力块大小
  stride: 4 # 步长稀疏注意力步长
  cache_window_size: null # KV 缓存窗口大小（null=自适应）
  performer_feature_dim: 256 # Performer 线性注意力特征维度
  use_relative_position: false # 是否使用相对位置编码（关闭以兼容 FlashAttention）
  use_token_routing: false # [AUTO] 动态路由（增加开销，显存不足时关闭）
  num_routing_blocks: 8 # 路由块数量
  routing_top_k: 4 # 选择 top-k 个块
  use_hierarchical_compression: true # 静态分层压缩（开销小，效果好）
  compress_ratios: [1, 4, 16] # 压缩比列表
  use_learned_compressor: false # [AUTO] 可学习压缩器（需训练，推理慢，显存不足时关闭）

  # CalibAtt 稀疏注意力（需预先生成 mask）
  calib_mask_path: "" # 预计算的稀疏 mask 文件路径
  calib_top_k: 16 # 每个 query 保留的 top-k 个 key

  # 其他注意力变体（未使用）
  use_moe: false # 混合专家（未实现）
  use_mla: false # 低秩注意力（未实现）

  # ========== 量化与压缩 (TurboQuant) ==========
  use_turboquant: true # [AUTO] 启用极坐标量化 + QJL（4bit 量化，加速 10-20%）
  polar_quant_bits: 4 # 量化比特数
  qjl_rank: 64 # QJL 降维维度

  # ========== 记忆系统 (长期一致性) ==========
  use_internal_memory: true # [AUTO] 启用内部可训练记忆（LoRA 风格）
  memory_slots: 64 # 内部记忆槽位数
  memory_rank: 16 # 低秩更新维度
  memory_top_k: 8 # 读取时选中的槽位数
  memory_controller: "gru" # 记忆控制器类型：gru / lstm
  use_linear_fusion: true # 线性融合（比 Attention 融合快）

  use_multi_scale_memory: true # [AUTO] 多尺度记忆，捕捉不同时间跨度特征
  multi_scale_sizes: [4, 16, 32, 64, 128, 256] # 多尺度压缩粒度列表

  # 分级记忆（可选，默认关闭）
  use_hierarchical_memory: false
  short_memory_size: 128
  medium_memory_size: 256
  long_memory_size: 512

  # 外部记忆库
  use_memory_bank: true # 是否使用外部记忆库（MemoryBank）
  memory_size: 1024 # [AUTO] 记忆库容量（旗舰卡 1024，中端 512，低端 256/128）
  use_learned_retrieval: false # 是否使用可学习检索
  use_importance_pred: false # 是否使用重要性预测

  # ========== 推理加速黑科技 ==========
  enable_teacache: true # TeaCache：基于 timestep 的缓存，跳过相似步数
  teacache_threshold: 0.15 # [AUTO] 相似度阈值（旗舰卡 0.15，中端 0.18/0.20，低端 0.30）

  # PackForcing & Motion Adaptive（提升时序一致性）
  use_packforcing: true
  motion_adaptive: true

  # ShotStream 双缓存（需微调，默认关闭）
  use_shotstream: false

  # ========== 长视频分块策略 ==========
  max_block_frames: 192 # [AUTO] 单块帧数（配合 LeanVAE 时间压缩 4 倍）
  tile_batch_size: 4 # [AUTO] 空间分块并行数（根据显存调整）

  # 金字塔采样（默认关闭，耗时巨大）
  use_pyramid_sampling: false
  pyramid_base_resolution: "128p"
  pyramid_base_steps: 10
  refine_steps: 0 # 扩散精炼步数（0=关闭）

  # ========== 物理后处理 (轻度启用策略) ==========
  use_physics_correction: true # 启用物理校正（轻度，仅关键帧）
  phy_corr_keyframe_interval: 60 # 关键帧间隔（帧）
  phy_corr_solver: "simple" # 求解器：simple（快），warp（中），taichi（慢）
  phy_corr_smooth: false # 关闭全局光流平滑（耗时）

  # ========== 其他增强 ==========
  use_frame_corruption: true # 抗漂移训练（训练时随机损坏帧）
  corruption_prob: 0.15 # 每帧损坏概率
  corruption_modes: null # 损坏类型列表（null=随机选）
  corruption_num_modes: 2 # 每帧组合损坏数量（模拟复杂退化）
  use_first_frame_anchor: true # 首帧锚定，抑制漂移
  use_concatenated_history: true # 拼接历史注入，增强上下文
  use_rope_jitter: false # RoPE 抖动（训练技巧）
  rope_jitter_scale: 1e-5

  # ========== TensorRT（需预先导出引擎） ==========
  use_tensorrt: false # 是否使用 TensorRT（需先运行 export.py 导出 engine）
  tensorrt_engine_path: "model.trt" # TensorRT 引擎文件路径

  # ========== 流水线并行 ==========
  use_pipeline: false # 是否启用流水线并行（异步生成 + 解码融合）

  # ========== 1 步蒸馏（需训练） ==========
  use_one_step_distill: false # 是否使用 1 步对抗蒸馏（需训练）

  # ========== 多模态输入 ==========
  use_image_encoder: true # 图像编码器（CLIP Vision）
  use_audio_encoder: false # 音频编码器（Wav2Vec2，当前未启用）
  use_video_encoder: true # 视频编码器（基于 VAE 特征）
  image_encoder_model: "./models/clip"
  audio_encoder_model: "./models/wav2vec2-base"
  text_encoder_model: "./models/clip"
  text_encoder: "clip" # 文本编码器类型：clip / t5 / xlm-roberta
  max_reference_images: 4
  max_reference_audios: 2
  max_reference_videos: 2
  multi_modal_fusion: "gate" # 多模态融合方式：sum（简单相加），gate（门控）
  use_unified_cond: true # 统一条件序列（提升语义理解）

  # ========== 扩散参数 ==========
  num_timesteps: 1000 # 扩散总步数（训练用）
  scheduler_type: "ddpm" # 调度器类型：ddpm, ddim, dpm, pndm, lcm
  beta_start: 0.0001
  beta_end: 0.02
  cfg_scale: 7.5 # CFG 引导强度（推荐 7.5）
  num_inference_steps: 50 # 默认推理步数（若开启蒸馏，WebUI 会强制覆盖为 4）
  vae_kl_weight: 0.001 # VAE KL 散度损失权重

  # ========== UNet 配置（备用） ==========
  unet_model_channels: 128
  unet_channel_mult: [1, 2, 4, 8]
  unet_num_res_blocks: 2
  unet_num_heads: 8

# ------------------------------------------------------------------------------
# 3. 脚本生成器配置
# ------------------------------------------------------------------------------
script_generator:
  enabled: true # 是否启用脚本生成功能
  mode: "local" # 模式：local（本地模型）或 api（OpenAI）
  model_name: "TinyLlama/TinyLlama-1.1B-Chat-v1.0" # 本地模型名称
  api_key: "" # OpenAI API 密钥（若 mode=api）
  max_plot_points: 8 # 最多提取情节点数

# ------------------------------------------------------------------------------
# 4. API 与服务配置
# ------------------------------------------------------------------------------
api:
  host: "0.0.0.0" # 服务监听地址（允许外部访问）
  port: 8000 # 服务端口
  temp_dir: "./temp" # 临时文件目录

# ------------------------------------------------------------------------------
# 5. 长视频规划配置
# ------------------------------------------------------------------------------
long_video:
  block_duration_sec: 30.0 # 每个时间块的时长（秒）
  overlap_sec: 0.5 # 块间重叠时长（秒）
  num_workers: 4 # 并行工作进程数

# ------------------------------------------------------------------------------
# 6. 数据集配置 (Data - 仅训练时使用)
# ------------------------------------------------------------------------------
data:
  dataset_type: "webvid" # 数据集类型：webvid / real / ucf101 / synthetic
  data_root: "./data" # 数据根目录
  webvid_metadata_path: "./data/webvid/metadata.csv"
  webvid_video_root: "./data/webvid/videos"
  split_file: null # 数据集划分文件（UCF101 等用）
  num_frames: 16 # 训练样本帧数（渐进式训练会动态覆盖）
  image_size: 256 # 训练图像分辨率（正方形）
  frame_interval: 1 # 帧采样间隔（1=连续，2=隔一取一）
  augmentation: true # 数据增强
  batch_size: 4 # 训练批次大小
  num_workers: 4 # 数据加载线程数
  pin_memory: true # 锁页内存加速
  val_split: 0.01 # 验证集比例
